<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE P2P LEGEND | SATOSHI NEURAL MONITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #00ff41; --p-gold: #ffcc00; --p-blue: #00e5ff; --p-red: #ff3131; }
        * { box-sizing: border-box; cursor: crosshair; }
        body { 
            background: #000; color: var(--p-green); font-family: 'VT323', monospace; 
            margin: 0; overflow-x: hidden; position: relative; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* BITCOIN RAIN EFFECT */
        .btc-particle {
            position: fixed; top: -50px; width: 32px; height: 32px;
            background-image: url('btc_coin.png'); 
            background-size: contain; background-repeat: no-repeat;
            z-index: 1; animation: fall linear infinite; pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(115vh) rotate(360deg); } }

        /* DOUBLE BORDER HEADER */
        .header-box { 
            border: 4px double var(--p-gold); padding: 20px; text-align: center; 
            margin-bottom: 20px; background: rgba(0,0,0,0.9); width: 100%; max-width: 900px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }
        #timer { font-size: 5.5vw; color: #fff; display: flex; justify-content: center; gap: 15px; white-space: nowrap; }
        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* MAIN DASHBOARD */
        .main-ui { border: 1px solid var(--p-green); padding: 20px; width: 100%; max-width: 900px; background: rgba(0,15,0,0.85); position: relative; z-index: 10; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { border: 1px solid rgba(0,255,65,0.4); padding: 15px; text-align: center; background: rgba(0,0,0,0.5); }
        .stat-label { color: var(--p-blue); font-size: 1.1em; letter-spacing: 1px; }
        .stat-val { font-size: 2.8em; color: #fff; display: block; text-shadow: 0 0 10px var(--p-green); }

        /* BUY FEED <$2 */
        .feed-box { border: 1px solid rgba(0,255,65,0.3); height: 110px; padding: 10px; overflow: hidden; margin-bottom: 20px; font-size: 1.05em; background: #050505; }
        .feed-item { margin-bottom: 6px; animation: slideIn 0.3s ease-out; color: #888; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } }

        /* 2-COLUMN HOLDER TABLE */
        .holder-wrap { border: 1px solid var(--p-gold); padding: 15px; background: rgba(0,0,0,0.6); }
        .table-container { display: flex; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        th { color: var(--p-gold); border-bottom: 1px solid var(--p-gold); padding: 5px; text-align: left; }
        td { padding: 6px 2px; }
        .addr { color: var(--p-blue); font-family: monospace; }

        /* FOOTER BUTTONS */
        .social-links { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; width: 100%; max-width: 900px; }
        .btn-link { 
            border: 2px solid var(--p-gold); color: var(--p-gold); padding: 15px; 
            text-align: center; text-decoration: none; font-size: 1.6em; font-weight: bold; background: #000;
        }
        .btn-link:hover { background: var(--p-gold); color: #000; box-shadow: 0 0 20px var(--p-gold); transform: scale(1.02); }
        .audio-btn { border: 1px solid var(--p-green); color: var(--p-green); background: none; padding: 5px 15px; cursor: pointer; font-family: 'VT323'; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header-box">
    <div style="color:var(--p-gold); margin-bottom:10px; letter-spacing: 2px;">> NEURAL LINK COUNTDOWN TO SATOSHI'S BIRTHDAY</div>
    <div id="timer">00D : 00H : 00M : 00S</div>
</div>

<button class="audio-btn" onclick="toggleMusic()">[ CLICK TO ENABLE SOUND ]</button>

<div class="main-ui">
    <div style="text-align:center; font-size: 3em; letter-spacing: 12px; margin-bottom: 10px; font-weight: bold;">THE P2P LEGEND</div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">HOLDERS</span>
            <span id="h-val" class="stat-val">000</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MARKET CAP</span>
            <span id="m-val" class="stat-val">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">BTC REWARDS</span>
            <span id="r-val" class="stat-val">0.000</span>
        </div>
    </div>

    <div id="feed" class="feed-box"></div>

    <div class="holder-wrap">
        <div style="text-align:center; color:var(--p-gold); margin-bottom:12px; font-size: 1.3em; letter-spacing: 2px;">TOP LEGENDARY HOLDERS</div>
        <div class="table-container">
            <table id="t1"><thead><tr><th>R</th><th>ADDRESS</th><th>BALANCE</th></tr></thead><tbody></tbody></table>
            <table id="t2"><thead><tr><th>R</th><th>ADDRESS</th><th>BALANCE</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<div class="social-links">
    <a href="https://x.com/i/communities/2038186875488522599" target="_blank" class="btn-link">COMMUNITY ON X</a>
    <a href="https://pump.fun/coin/95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump" target="_blank" class="btn-link">TRADE ON PUMPFUN</a>
</div>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
    const NGROK_API = 'https://inevitably-unvacated-shirl.ngrok-free.dev';

    // 1. Bitcoin Rain
    function startRain() {
        const b = document.createElement('div');
        b.className = 'btc-particle';
        b.style.left = Math.random() * 95 + 'vw';
        b.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 5500);
    }
    setInterval(startRain, 450);

    // 2. Countdown Logic
    setInterval(() => {
        const gap = new Date("April 5, 2026 00:00:00") - new Date();
        const d = Math.floor(gap / 86400000), h = Math.floor((gap % 86400000) / 3600000);
        const m = Math.floor((gap % 3600000) / 60000), s = Math.floor((gap % 60000) / 1000);
        document.getElementById('timer').innerHTML = `${d}D : ${h.toString().padStart(2,'0')}H : ${m.toString().padStart(2,'0')}M : <span class="blink" style="color:var(--p-red)">${s.toString().padStart(2,'0')}S</span>`;
    }, 1000);

    // 3. Real-time Data Sync
    async function sync() {
        try {
            const res = await fetch(`${NGROK_API}/api/stats`);
            const data = await res.json();
            document.getElementById('h-val').innerText = data.totalHolders;
            document.getElementById('r-val').innerText = data.totalBtcDistributed.toFixed(4);
            document.getElementById('m-val').innerText = "$" + (data.totalHolders * 125000).toLocaleString();
            
            // 2-Column Table Logic
            const rows = data.topHolders.map(h => `<tr><td>${h.rank}</td><td class="addr">${h.wallet}</td><td>${Number(h.balance).toLocaleString()}</td></tr>`);
            document.querySelector('#t1 tbody').innerHTML = rows.slice(0,5).join('');
            document.querySelector('#t2 tbody').innerHTML = rows.slice(5,10).join('');
        } catch(e) { console.log("Bot connection lost..."); }
    }
    setInterval(sync, 10000); sync();

    // 4. Buy Feed Simulator < $2
    setInterval(() => {
        const f = document.getElementById('feed');
        const item = document.createElement('div');
        item.className = 'feed-item';
        item.innerHTML = `> [NETWORK] Wallet SOL_${Math.random().toString(36).substring(7).toUpperCase()} swapped $${(Math.random()*1.85).toFixed(2)} for P2P LEGEND`;
        f.prepend(item);
        if(f.children.length > 4) f.lastElementChild.remove();
    }, 4000);

    // 5. Music Control
    function toggleMusic() {
        const a = document.getElementById('bgm');
        if (a.paused) a.play().catch(() => {}); else a.pause();
    }
</script>
</body>
</html>
