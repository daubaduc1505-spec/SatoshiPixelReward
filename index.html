<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE P2P LEGEND | MATRIX MONITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #00ff41; --p-gold: #ffcc00; --p-blue: #00e5ff; --p-red: #ff3131; }
        * { box-sizing: border-box; cursor: crosshair; }
        body { 
            background: #000; color: var(--p-green); font-family: 'VT323', monospace; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 120vh; /* Cho phép cuộn trang xuống dưới */
        }

        /* FIX LỖI NỀN TRẮNG ĐỒNG XU */
        .btc-particle {
            position: fixed; top: -50px; width: 35px; height: 35px;
            background-image: url('btc_coin.png'); background-size: contain;
            background-repeat: no-repeat; z-index: 1; animation: fall linear infinite;
            mix-blend-mode: screen; /* Lọc bỏ nền trắng/đen của ảnh */
            filter: drop-shadow(0 0 5px var(--p-gold));
        }
        @keyframes fall { to { transform: translateY(115vh) rotate(360deg); } }

        .header-box { border: 4px double var(--p-gold); padding: 15px; text-align: center; margin-bottom: 20px; width: 100%; max-width: 1000px; }
        #timer { font-size: 5vw; color: #fff; display: flex; justify-content: center; gap: 15px; }

        .main-ui { border: 1px solid var(--p-green); padding: 25px; width: 100%; max-width: 1000px; background: rgba(0,15,0,0.9); z-index: 10; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { border: 1px solid rgba(0,255,65,0.4); padding: 10px; text-align: center; }
        .stat-val { font-size: 2.3em; color: #fff; display: block; }

        /* BỘ ĐẾM 5 PHÚT NHẢY GIÂY */
        .pending-box { border: 2px dashed var(--p-gold); padding: 15px; margin: 20px 0; text-align: center; background: rgba(255,204,0,0.1); }
        #p-val { font-size: 2.6em; color: #fff; text-shadow: 0 0 15px var(--p-gold); }

        .feed-box { border: 1px solid rgba(0,255,65,0.3); height: 110px; padding: 10px; overflow: hidden; margin-bottom: 20px; background: #050505; }
        
        /* BẢNG HOLDER 2 CỘT RỘNG RÃI */
        .holder-wrap { border: 1px solid var(--p-gold); padding: 15px; }
        .table-container { display: flex; gap: 30px; flex-wrap: wrap; }
        table { flex: 1; min-width: 400px; border-collapse: collapse; }
        th { color: var(--p-gold); border-bottom: 1px solid var(--p-gold); text-align: left; }
        td { padding: 8px 0; border-bottom: 1px solid rgba(0,255,65,0.1); }

        /* LINK X & PUMPFUN */
        .social-links { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1000px; margin: 30px 0; }
        .btn-link { border: 2px solid var(--p-gold); color: var(--p-gold); padding: 20px; text-align: center; text-decoration: none; font-size: 1.8em; font-weight: bold; }
        .btn-link:hover { background: var(--p-gold); color: #000; box-shadow: 0 0 20px var(--p-gold); }

        .audio-btn { border: 1px solid var(--p-green); color: var(--p-green); background: none; padding: 10px; cursor: pointer; margin-bottom: 10px; font-family: 'VT323'; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="header-box">
    <div style="color:var(--p-gold)">> NEURAL LINK COUNTDOWN TO SATOSHI'S BIRTHDAY</div>
    <div id="timer">00D : 00H : 00M : 00S</div>
</div>

<button class="audio-btn" onclick="toggleMusic()">[ CLICK TO ENABLE NEURAL SOUND ]</button>

<div class="main-ui">
    <div style="text-align:center; font-size: 3em; letter-spacing: 12px; margin-bottom: 15px; font-weight: bold;">THE P2P LEGEND</div>
    
    <div class="stats-grid">
        <div class="stat-card"><span>HOLDERS (REAL)</span><span id="h-val" class="stat-val">0</span></div>
        <div class="stat-card"><span>MARKET CAP</span><span id="m-val" class="stat-val">$0</span></div>
        <div class="stat-card"><span>TOTAL BTC PAID</span><span id="r-val" class="stat-val">0.00000000</span></div>
    </div>

    <div class="pending-box">
        <div id="p-val">0.00000000 BTC</div>
        <div style="color:var(--p-red); font-weight: bold;">NEXT REWARD IN: <span id="distribute-timer">05:00</span></div>
    </div>

    <div id="feed" class="feed-box"></div>

    <div class="holder-wrap">
        <div style="text-align:center; color:var(--p-gold); margin-bottom: 10px;">TOP LEGENDARY HOLDERS</div>
        <div class="table-container">
            <table id="t1"><thead><tr><th>R</th><th>ADDRESS</th><th>BALANCE</th></tr></thead><tbody></tbody></table>
            <table id="t2"><thead><tr><th>R</th><th>ADDRESS</th><th>BALANCE</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<div class="social-links">
    <a href="https://x.com/i/communities/2038186875488522599" target="_blank" class="btn-link">JOIN THE X FORCE</a>
    <a href="https://pump.fun/coin/95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump" target="_blank" class="btn-link">TRADE ON PUMPFUN</a>
</div>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
    // NHỚ THAY LINK NGROK CỦA BẠN VÀO ĐÂY
    const API_URL = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; 

    async function syncData() {
        try {
            const res = await fetch(`${API_URL}/api/stats`);
            const data = await res.json();
            
            document.getElementById('h-val').innerText = data.totalHolders.toLocaleString();
            document.getElementById('m-val').innerText = "$" + Math.floor(data.marketCap).toLocaleString();
            document.getElementById('r-val').innerText = data.btcRewards.toFixed(8);
            document.getElementById('p-val').innerText = data.pendingRewards.toFixed(8) + " BTC";

            // Hiển thị bộ đếm giây từ Server
            const mins = Math.floor(data.nextDistributeIn / 60);
            const secs = data.nextDistributeIn % 60;
            document.getElementById('distribute-timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

            if(data.topHolders && data.topHolders.length > 0) {
                const rows = data.topHolders.map(h => `<tr><td>${h.rank}</td><td style="color:var(--p-blue)">${h.wallet}</td><td>${h.balance}</td></tr>`);
                document.querySelector('#t1 tbody').innerHTML = rows.slice(0, 5).join('');
                document.querySelector('#t2 tbody').innerHTML = rows.slice(5, 10).join('');
            }
        } catch (e) { console.log("Reconnecting to Neural Link..."); }
    }

    setInterval(syncData, 5000); 
    syncData();

    function toggleMusic() {
        const a = document.getElementById('bgm');
        if (a.paused) a.play().catch(e => console.log("Music error")); else a.pause();
    }

    // Hiệu ứng hạt Bitcoin rơi - Đã fix nền trắng
    setInterval(() => {
        const b = document.createElement('div');
        b.className = 'btc-particle';
        b.style.left = Math.random() * 95 + 'vw';
        b.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 6000);
    }, 500);

    // Countdown Sinh nhật
    setInterval(() => {
        const gap = new Date("April 5, 2026 00:00:00") - new Date();
        const d = Math.floor(gap / 86400000), h = Math.floor((gap % 86400000) / 3600000);
        const m = Math.floor((gap % 3600000) / 60000), s = Math.floor((gap % 60000) / 1000);
        document.getElementById('timer').innerText = `${d}D : ${h}H : ${m}M : ${s}S`;
    }, 1000);
</script>
</body>
</html>
